workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Soulio_AppStoreConnect

    environment:
      vars:
        BUNDLE_ID: com.abadouay.rpelift
        APPLE_TEAM_ID: 5G936X6GYY
      node: 22.4.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Set up signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/$SCHEME.xcarchive"
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$IPA_DIR"
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$IPA_DIR" \
            -exportOptionsPlist /tmp/export_options.plist

    artifacts:
      - $CM_BUILD_DIR/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ayoub.abadou.etu23@ensam.ma
        notify:
          success: true
          failure: true
