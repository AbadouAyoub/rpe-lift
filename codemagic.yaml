workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Soulio_AppStoreConnect

    environment:
      vars:
        BUNDLE_ID: com.abadouay.rpelift
        XCODE_SCHEME: rpe-lift
        XCODE_WORKSPACE: ios/rpe-lift.xcworkspace
      node: 22.4.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_DEVELOPMENT \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          echo "Found workspace: $WORKSPACE"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Debug"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ayoub.abadou.etu23@ensam.ma
        notify:
          success: true
          failure: true
