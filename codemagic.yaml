workflows:
  ios-development:
    name: iOS Development Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Magic API key

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.abadouay.rpelift
      vars:
        BUNDLE_ID: com.abadouay.rpelift
        XCODE_SCHEME: rpe-lift
      node: 22.4.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles --warn-only

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "ios/rpe-lift.xcworkspace" \
            --scheme "$XCODE_SCHEME" \
            --config "Debug"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - ayoub.abadou.etu23@ensam.ma
        notify:
          success: true
          failure: true
