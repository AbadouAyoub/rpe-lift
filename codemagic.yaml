workflows:
  ios-development:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Soulio_AppStoreConnect

    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: com.abadouay.rpelift
        APPLE_TEAM_ID: 5G936X6GYY
      node: 22.4.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Set build number
        script: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.ios = app.expo.ios || {};
          app.expo.ios.buildNumber = process.env.BUILD_NUMBER;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          console.log('iOS build number set to:', process.env.BUILD_NUMBER);
          "

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build iOS
        script: |
          set -e
          keychain initialize

          PRIVATE_KEY_PATH=/tmp/cert_private_key.pem
          echo "=== Preparing certificate private key ==="
          if [ -n "$CERTIFICATE_PRIVATE_KEY_B64" ]; then
            echo "Using stored key (base64)."
            echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > "$PRIVATE_KEY_PATH"
          else
            openssl genrsa -out "$PRIVATE_KEY_PATH" 2048
            echo "=== SAVE THIS AS CERTIFICATE_PRIVATE_KEY_B64 IN CODEMAGIC ENV VARS ==="
            base64 < "$PRIVATE_KEY_PATH" | tr -d '\n'
            echo ""
            echo "=== END ==="
          fi

          echo "=== Fetching signing files ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$PRIVATE_KEY_PATH" \
            --create

          echo "=== Provisioning profiles on disk ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "no profiles dir"

          keychain add-certificates

          echo "=== Applying profiles to project ==="
          xcode-project use-profiles --warn-only

          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - ayoub.abadou.etu23@ensam.ma
        notify:
          success: true
          failure: true
